services:
  - type: web
    name: api-gateway
    env: node
    plan: free
    rootDir: backend/api-gateway
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: PORT
        value: 5000
      - key: NODE_ENV
        value: production
      - key: CORS_ORIGIN
        value: "*" # Set to your frontend URL

  - type: web
    name: auth-service
    env: node
    plan: free
    rootDir: backend/auth-service
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: PORT
        value: 8003
      - key: NODE_ENV
        value: production
      - key: CORS_ORIGIN
        value: "*" # Set to your frontend URL

  - type: web
    name: collab-service
    env: node
    plan: free
    rootDir: backend/collab-service
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: PORT
        value: 4000
      - key: NODE_ENV
        value: production
      - key: API_GATEWAY_URL
        fromService:
          name: api-gateway
          type: web
          envVarKey: RENDER_EXTERNAL_URL
      - key: CORS_ORIGIN
        value: "*" # Set to your frontend URL

  - type: web
    name: snapshot-worker
    env: node
    plan: free
    rootDir: backend/snapshot-worker
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      # Add MONGO_URL, RABBITMQ_URL/AMQP_URL
